services:
  db:
    image: postgres:16-alpine
    container_name: agentai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentai
      POSTGRES_PASSWORD: name12345678
      POSTGRES_DB: agentai
    ports:
      - "5432:5432"
    volumes:
      - agentai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentai -d agentai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  agentai_pgdata:
